robot_type: robotera_q5

fps: 100
max_duration_s: 90.0

observations:
  - key: observation.images.right
    topic: /camera/camera/color/image_raw/compressed
    type: sensor_msgs/msg/CompressedImage
    image:
      resize: [512, 512]
    align: { strategy: hold, stamp: header }
    qos: { reliability: best_effort, history: keep_last, depth: 10 }

  - key: observation.state
    topic: /wr1_controller/commands
    type: xbot_common_interfaces/msg/HybridJointCommand
    selector:
      names:
        - position.left_shoulder_pitch_joint
        - position.left_shoulder_roll_joint
        - position.left_arm_yaw_joint
        - position.left_elbow_pitch_joint
        - position.left_elbow_yaw_joint
        - position.left_wrist_pitch_joint
        - position.left_wrist_roll_joint
        - position.right_shoulder_pitch_joint
        - position.right_shoulder_roll_joint
        - position.right_arm_yaw_joint
        - position.right_elbow_pitch_joint
        - position.right_elbow_yaw_joint
        - position.right_wrist_pitch_joint
        - position.right_wrist_roll_joint
    align: { strategy: hold, stamp: header }
    qos: { reliability: reliable, history: keep_last, depth: 1 }

actions:
  - key: action
    publish:
      topic: /wr1_controller/commands
      type: xbot_common_interfaces/msg/HybridJointCommand
      qos: { reliability: reliable, history: keep_last, depth: 1 }
    selector:
      names:
        - position.left_shoulder_pitch_joint
        - position.left_shoulder_roll_joint
        - position.left_arm_yaw_joint
        - position.left_elbow_pitch_joint
        - position.left_elbow_yaw_joint
        - position.left_wrist_pitch_joint
        - position.left_wrist_roll_joint
        - position.right_shoulder_pitch_joint
        - position.right_shoulder_roll_joint
        - position.right_arm_yaw_joint
        - position.right_elbow_pitch_joint
        - position.right_elbow_yaw_joint
        - position.right_wrist_pitch_joint
        - position.right_wrist_roll_joint
    encoder: rosetta.robotera_q5_encoders:encode_q5_arm_hybrid_joint_command
    safety_behavior: hold

recording:
  storage: mcap
